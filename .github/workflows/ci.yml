name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev --directory services/api --frozen
      - name: Typecheck (mypy)
        run: uv run --extra dev --directory services/api mypy src
      - name: Tests (pytest)
        run: uv run --extra dev --directory services/api pytest

  frontend:
    name: Frontend (typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck:web
      - name: Tests (vitest)
        run: npm run test:web
      - name: Production build
        run: npm run build:web
